<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Jogos | Heartz Club</title>

    <link rel="stylesheet"
          href="../components/styles/global.css">

    <link rel="stylesheet"
          href="paginaJogos.css">

</head>

<body>

    <div id="header"></div>

    <main class="catalogo">

        <!-- TOPO -->

        <section class="catalogo__topo">

            <h1 class="catalogo__title">
                Catálogo de Jogos
            </h1>

            <input
                type="text"
                id="search-input"
                class="catalogo__search"
                placeholder="Pesquisar jogo..."
            >

        </section>

        <!-- GRID -->

        <section
            class="games"
            id="games-container"
        >

            <p class="loading">
                Carregando jogos...
            </p>

        </section>

    </main>

    <div id="footer"></div>

    <script src="../components/inlcuide.js"></script>

    <script src="./paginaJogos.js"></script>

</body>

</html>
